<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Pong Game</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.container {
    text-align: center;
    color: white;
}

canvas {
    background: black;
    border: 3px solid white;
    box-shadow: 0 0 20px black;
    touch-action: none;
}

.controls {
    margin-top: 10px;
}

.advanced {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
}

.advanced strong {
    width: 100%;
    text-align: center;
}

.powerup {
    position: absolute;
    color: yellow;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥 Ultimate Pong</h1>
    <canvas id="gameCanvas"></canvas>

    <div>
        Player: <span id="pScore">0</span> |
        Computer: <span id="cScore">0</span> |
        🏆 High Score: <span id="highScore">0</span>
    </div>

    <div class="controls">
        Speed:
        <input type="range" id="speed" min="3" max="12" value="5">

        Difficulty:
        <select id="difficulty">
            <option value="3">Easy</option>
            <option value="5" selected>Medium</option>
            <option value="8">Hard</option>
        </select>

        <button onclick="togglePause()">Pause</button>
        <button onclick="resetGame()">Reset</button>

        <div class="advanced">
            <strong>Advanced:</strong>
            Ball Size:
            <select id="ballSize" onchange="setBallSize(this.value)">
                <option value="5">Small</option>
                <option value="8" selected>Medium</option>
                <option value="12">Large</option>
            </select>

            AI Mode:
            <select id="aiMode" onchange="setAIMode(this.value)">
                <option value="normal" selected>Normal</option>
                <option value="predictive">Predictive</option>
                <option value="reactive">Reactive</option>
            </select>

            <button onclick="togglePowerUps()" id="powerupsBtn">Power-ups: On</button>
            <button onclick="toggleSound()" id="soundBtn">Sound: On</button>
            <button onclick="toggleTrail()" id="trailBtn">Trail: Off</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Responsive
function resizeCanvas() {
    canvas.width = window.innerWidth * 0.7;
    canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// Audio
const hitSound = new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
const scoreSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// Game State
let playerScore = 0;
let computerScore = 0;
let highScore = localStorage.getItem("pongHigh") || 0;
document.getElementById("highScore").textContent = highScore;

let isPaused = false;
const WIN_SCORE = 10;

// Paddle
const paddle = { width: 10, height: 100 };

const player = { x: 10, y: 100 };
const computer = { x: 0, y: 100 };

// Ball
const ball = {
    x: 0, y: 0,
    size: 8,
    speed: 5,
    dx: 5,
    dy: 5,
    maxSpeed: 15
};

// Powerups and game options
let powerUps = [];
let powerUpsEnabled = true;
let soundEnabled = true;
let trailEnabled = false;
let aiMode = "normal";
let keyState = { up: false, down: false };
let trailHistory = [];

function playSound(sound) {
    if (!soundEnabled) return;
    sound.currentTime = 0;
    sound.play().catch(() => {});
}

function spawnPowerUp() {
    if (!powerUpsEnabled) return;

    const types = ["speed", "big", "slow"];
    powerUps.push({
        x: 20 + Math.random() * (canvas.width - 40),
        y: 20 + Math.random() * (canvas.height - 40),
        type: types[Math.floor(Math.random() * types.length)],
        size: 12
    });
}
setInterval(spawnPowerUp, 5000);

// Reset Ball
function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.dx = (Math.random()>0.5?1:-1)*ball.speed;
    ball.dy = (Math.random()>0.5?1:-1)*ball.speed;
}

// Touch, Mouse, and Keyboard
function movePlayer(y) {
    player.y = Math.min(Math.max(y - paddle.height / 2, 0), canvas.height - paddle.height);
}

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    movePlayer(e.clientY - rect.top);
});

canvas.addEventListener("touchmove", e => {
    const rect = canvas.getBoundingClientRect();
    movePlayer(e.touches[0].clientY - rect.top);
});

window.addEventListener("keydown", e => {
    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") keyState.up = true;
    if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") keyState.down = true;
});

window.addEventListener("keyup", e => {
    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") keyState.up = false;
    if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") keyState.down = false;
});

// Update
function update() {
    if (isPaused) return;

    const speedMultiplier = document.getElementById("speed").value / 5;

    if (keyState.up) player.y = Math.max(player.y - 7, 0);
    if (keyState.down) player.y = Math.min(player.y + 7, canvas.height - paddle.height);

    ball.x += ball.dx * speedMultiplier;
    ball.y += ball.dy * speedMultiplier;

    if (trailEnabled) {
        trailHistory.unshift({ x: ball.x, y: ball.y });
        if (trailHistory.length > 25) trailHistory.pop();
    } else {
        trailHistory = [];
    }

    // Walls
    if (ball.y <= 0) {
        ball.y = 0;
        ball.dy *= -1;
    } else if (ball.y >= canvas.height) {
        ball.y = canvas.height;
        ball.dy *= -1;
    }

    // Paddle collision
    if (ball.x <= player.x + paddle.width && ball.x >= player.x &&
        ball.y > player.y && ball.y < player.y + paddle.height && ball.dx < 0) {
        calculateReflection(player.x);
        accelerateBall();
        playSound(hitSound);
    }

    if (ball.x + ball.size >= computer.x && ball.x <= computer.x + paddle.width &&
        ball.y > computer.y && ball.y < computer.y + paddle.height && ball.dx > 0) {
        calculateReflection(computer.x);
        accelerateBall();
        playSound(hitSound);
    }

    // Powerups collision
    powerUps = powerUps.filter(p => {
        if (Math.abs(ball.x - p.x) < p.size && Math.abs(ball.y - p.y) < p.size) {
            applyPowerUp(p.type);
            return false;
        }
        return true;
    });

    // Score
    if (ball.x < 0) {
        computerScore++;
        playSound(scoreSound);
        resetBall();
    }

    if (ball.x > canvas.width) {
        playerScore++;
        playSound(scoreSound);
        if (playerScore > highScore) {
            highScore = playerScore;
            localStorage.setItem("pongHigh", highScore);
        }
        resetBall();
    }

    document.getElementById("pScore").textContent = playerScore;
    document.getElementById("cScore").textContent = computerScore;
    document.getElementById("highScore").textContent = highScore;

    checkWinner();

    // AI
    const aiSpeed = parseFloat(document.getElementById("difficulty").value);
    let target;

    if (aiMode === "predictive") {
        target = ball.y + ball.dy * 18;
    } else if (aiMode === "reactive") {
        target = ball.y;
    } else {
        target = ball.y - paddle.height / 2 + ball.dy * 5;
    }

    if (computer.y + paddle.height / 2 < target) computer.y += aiSpeed;
    else computer.y -= aiSpeed;

    computer.y = Math.min(Math.max(computer.y, 0), canvas.height - paddle.height);
    computer.x = canvas.width - 20;
}

// Powerup Effects
function applyPowerUp(type) {
    if (type === "speed") ball.speed = Math.min(ball.speed + 2, ball.maxSpeed);
    if (type === "slow") ball.speed = Math.max(ball.speed - 2, 3);
    if (type === "big") paddle.height = Math.min(paddle.height + 25, 180);

    setTimeout(() => { paddle.height = 100; }, 5000);
}

function calculateReflection(paddleX) {
    const paddleY = paddleX === player.x ? player.y : computer.y;
    const relativeY = (ball.y - paddleY) / paddle.height;
    const bounceAngle = (relativeY - 0.5) * Math.PI / 2;
    const direction = paddleX === player.x ? 1 : -1;

    ball.dx = Math.cos(bounceAngle) * ball.speed * direction;
    ball.dy = Math.sin(bounceAngle) * ball.speed;
}

// Acceleration
function accelerateBall() {
    const angle = Math.atan2(ball.dy, ball.dx);
    ball.speed = Math.min(ball.speed + 0.3, ball.maxSpeed);
    ball.dx = Math.cos(angle) * ball.speed;
    ball.dy = Math.sin(angle) * ball.speed;
}

function togglePowerUps() {
    powerUpsEnabled = !powerUpsEnabled;
    document.getElementById("powerupsBtn").textContent = `Power-ups: ${powerUpsEnabled ? "On" : "Off"}`;
    if (!powerUpsEnabled) powerUps = [];
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById("soundBtn").textContent = `Sound: ${soundEnabled ? "On" : "Off"}`;
}

function toggleTrail() {
    trailEnabled = !trailEnabled;
    document.getElementById("trailBtn").textContent = `Trail: ${trailEnabled ? "On" : "Off"}`;
    if (!trailEnabled) trailHistory = [];
}

function setBallSize(size) {
    ball.size = parseInt(size, 10);
}

function setAIMode(mode) {
    aiMode = mode;
}

// Draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.shadowBlur = 10;
    ctx.shadowColor = "white";

    if (trailEnabled && trailHistory.length) {
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = ball.size;
        ctx.beginPath();
        trailHistory.forEach((pos, index) => {
            if (index === 0) ctx.moveTo(pos.x, pos.y);
            else ctx.lineTo(pos.x, pos.y);
        });
        ctx.stroke();
    }

    ctx.fillStyle = "#00ffff";
    ctx.fillRect(player.x, player.y, paddle.width, paddle.height);

    ctx.fillStyle = "#ff9900";
    ctx.fillRect(computer.x, computer.y, paddle.width, paddle.height);

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    // Draw Powerups
    powerUps.forEach(p => {
        ctx.fillStyle = "yellow";
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });
}

// Loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Pause
function togglePause() {
    isPaused = !isPaused;
}

// Reset
function resetGame() {
    playerScore = 0;
    computerScore = 0;
    ball.speed = 5;
    paddle.height = 100;
    resetBall();
}

// Winner
function checkWinner() {
    if (playerScore >= WIN_SCORE) {
        alert("🏆 You Win!");
        resetGame();
    }
    if (computerScore >= WIN_SCORE) {
        alert("💻 Computer Wins!");
        resetGame();
    }
}

// Init
resetBall();
gameLoop();

</script>

</body>
</html>
